<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>body{padding:20px; background:#f4f7f6; font-family: sans-serif;}</style>
</head>
<body>
    <div class="container" style="max-width:600px; background:#fff; padding:30px; border-radius:10px;">
        <h3 class="text-center">ตู้กดขนมอัตโนมัติ</h3>
        <form id="myForm">
            <input type="datetime-local" class="form-control mb-2" id="dt" name="Date_Time" required>
            <input type="text" class="form-control mb-2" name="Machine_ID" placeholder="รหัสตู้ (เช่น VM-001)" required>
            <select class="form-select mb-2" name="Transaction_Type" required>
                <option value="รายรับ">รายรับ</option><option value="รายจ่าย">รายจ่าย</option>
            </select>
            <input list="items" class="form-control mb-2" name="Description" placeholder="รายละเอียด (เช่น โค้ก, ฟันโอ)" required>
            <datalist id="items"><option value="โค้ก"><option value="ขนมฟันโอ"></datalist>
            <input type="number" class="form-control mb-2" name="Amount" placeholder="จำนวนเงิน" required>
            <textarea class="form-control mb-3" name="Notes" placeholder="หมายเหตุ"></textarea>
            <button type="submit" class="btn btn-success w-100" id="btn">บันทึก</button>
        </form>
    </div>
    <script>
        document.getElementById('dt').value = new Date().toISOString().slice(0,16);
        document.getElementById('myForm').addEventListener('submit', function(e){
            e.preventDefault();
            document.getElementById('btn').innerText = "กำลังบันทึก...";
            fetch('<?= ScriptApp.getService().getUrl() ?>', {method:'POST', body:new FormData(this)})
            .then(() => {
                Swal.fire('สำเร็จ!', 'บันทึกข้อมูลเรียบร้อย', 'success');
                this.reset();
                document.getElementById('dt').value = new Date().toISOString().slice(0,16);
                document.getElementById('btn').innerText = "บันทึก";
            });
        });
    </script>
</body>
</html>
